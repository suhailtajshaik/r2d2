services:
  guardian:
    build: .
    container_name: r2d2-guardian
    restart: unless-stopped
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - /home/r2d2/nginx:/home/r2d2/nginx
      - /home/r2d2/guardian:/home/r2d2/guardian
      - /home/r2d2/brain:/home/r2d2/brain
      - /home/r2d2/.config:/root/.config
      - /home/r2d2/headlines-today:/home/r2d2/headlines-today
      - /home/r2d2/tools:/home/r2d2/tools
      - /home/r2d2/.claude:/root/.claude:ro
      - /home/r2d2/.claude:/home/r2d2/.claude
      - /home/r2d2/projects:/home/r2d2/projects
      - /home/r2d2/.ssh:/root/.ssh:ro
    environment:
      - GUARDIAN_CHANNEL=local
      - NOTION_API_KEY=${NOTION_API_KEY:-}
      - TZ=America/New_York
    network_mode: host
