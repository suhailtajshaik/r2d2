services:
  nginx:
    image: nginx:alpine
    container_name: r2d2-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./conf.d:/etc/nginx/conf.d:ro
      - ./ssl:/etc/nginx/ssl:ro
    networks:
      - r2d2-proxy
      - sellbridge-dev
      - rag-network
      - prompt-studio

networks:
  r2d2-proxy:
    external: true
  sellbridge-dev:
    external: true
  rag-network:
    external: true
    name: rag-app_rag-network
  prompt-studio:
    external: true
    name: prompt-studio
