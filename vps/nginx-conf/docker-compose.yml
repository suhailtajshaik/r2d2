services:
  r2d2-nginx:
    image: nginx:alpine
    container_name: r2d2-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./ssl:/etc/nginx/ssl:ro
    networks:
      - r2d2-proxy
    restart: unless-stopped

networks:
  r2d2-proxy:
    external: true
