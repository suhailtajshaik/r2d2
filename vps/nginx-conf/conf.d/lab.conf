# ═══════════════════════════════════════════════════
# LAB — lab.suhailtaj.cloud
# All apps served under this domain
# ═══════════════════════════════════════════════════

# Rate limiting
limit_req_zone $binary_remote_addr zone=api_limit:10m rate=30r/s;
limit_req_zone $binary_remote_addr zone=general_limit:10m rate=60r/s;

server {
    listen 443 ssl;
    http2 on;
    server_name lab.suhailtaj.cloud;

    include /etc/nginx/conf.d/common/ssl.conf;
    include /etc/nginx/conf.d/common/security.conf;

    client_max_body_size 50M;

    # ─── SellBridge Dev ────────────────────────────────
    location = /dev  { return 301 /dev/sellbridge/; }
    location = /dev/ { return 301 /dev/sellbridge/; }

    location /dev/sellbridge/api/ {
        resolver 127.0.0.11 valid=30s;
        set $dev_backend_upstream sellbridge-dev-backend:8001;
        limit_req zone=api_limit burst=50 nodelay;
        proxy_pass http://$dev_backend_upstream/api/;
        include /etc/nginx/conf.d/common/proxy.conf;
        proxy_read_timeout 300s;
    }

    location = /dev/sellbridge {
        resolver 127.0.0.11 valid=30s;
        set $dev_frontend_upstream sellbridge-dev-frontend:3000;
        proxy_pass http://$dev_frontend_upstream/dev/sellbridge;
        include /etc/nginx/conf.d/common/proxy.conf;
    }

    location /dev/sellbridge/ {
        resolver 127.0.0.11 valid=30s;
        set $dev_frontend_upstream2 sellbridge-dev-frontend:3000;
        proxy_pass http://$dev_frontend_upstream2;
        include /etc/nginx/conf.d/common/proxy.conf;
    }

    # ─── MissionCrew ──────────────────────────────────
    location /missioncrew {
        resolver 127.0.0.11 valid=30s;
        set $missioncrew_upstream missioncrew-playground:3100;
        proxy_pass http://$missioncrew_upstream;
        include /etc/nginx/conf.d/common/proxy.conf;
        proxy_read_timeout 120s;
    }

    # ─── RAG Chat App ─────────────────────────────────
    location /rag {
        resolver 127.0.0.11 valid=30s;
        set $rag_frontend_upstream rag-frontend:3000;
        proxy_pass http://$rag_frontend_upstream;
        include /etc/nginx/conf.d/common/proxy.conf;
    }

    location /rag-api/ {
        resolver 127.0.0.11 valid=30s;
        set $rag_backend_upstream rag-backend:8200;
        proxy_pass http://$rag_backend_upstream/;
        include /etc/nginx/conf.d/common/proxy.conf;
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
        proxy_buffering off;
        client_max_body_size 100m;
    }

    # ─── GST Ledger ───────────────────────────────────
    location = /ledger { return 301 /ledger/; }

    location /ledger/ {
        resolver 127.0.0.11 valid=30s;
        set $gst_ledger_upstream gst-ledger:3000;
        proxy_pass http://$gst_ledger_upstream;
        include /etc/nginx/conf.d/common/proxy.conf;
        proxy_buffer_size 128k;
        proxy_buffers 4 256k;
        proxy_read_timeout 120s;
    }

    # ─── R2D2 Voice Bridge (Vapi LLM endpoint) ───────
    location /voice-api/ {
        resolver 127.0.0.11 valid=30s;
        set $voice_bridge_upstream r2d2-voice-bridge:3060;
        rewrite ^/voice-api/(.*) /$1 break;
        proxy_pass http://$voice_bridge_upstream;
        include /etc/nginx/conf.d/common/proxy.conf;
        proxy_read_timeout 120s;
        proxy_buffering off;
    }

    # ─── Prompt Studio ────────────────────────────────
    location = /prompt-studio { return 301 /prompt-studio/; }

    location /prompt-studio/api/ {
        resolver 127.0.0.11 valid=30s;
        set $localai_upstream localai:8080;
        rewrite ^/prompt-studio/api/(.*) /$1 break;
        proxy_pass http://$localai_upstream;
        include /etc/nginx/conf.d/common/proxy.conf;
        proxy_read_timeout 300s;
        proxy_connect_timeout 60s;
    }

    location /prompt-studio/ {
        resolver 127.0.0.11 valid=30s;
        set $prompt_studio_upstream prompt-studio:80;
        proxy_pass http://$prompt_studio_upstream;
        include /etc/nginx/conf.d/common/proxy.conf;
        add_header Access-Control-Allow-Origin "*" always;
    }

    # ─── Lab Landing Page ─────────────────────────────
    location / {
        resolver 127.0.0.11 valid=30s;
        set $lab_upstream lab:80;
        proxy_pass http://$lab_upstream;
        include /etc/nginx/conf.d/common/proxy.conf;
    }



    location /health {
        access_log off;
        return 200 'OK';
        add_header Content-Type text/plain;
    }
}
