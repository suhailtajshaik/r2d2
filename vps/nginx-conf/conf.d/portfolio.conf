# ═══════════════════════════════════════════════════
# PORTFOLIO — suhailtaj.cloud
# ═══════════════════════════════════════════════════

server {
    listen 443 ssl;
    http2 on;
    server_name suhailtaj.cloud www.suhailtaj.cloud;

    include /etc/nginx/conf.d/common/ssl.conf;
    include /etc/nginx/conf.d/common/security.conf;

    location / {
        resolver 127.0.0.11 valid=30s;
        set $portfolio_upstream portfolio:80;
        proxy_pass http://$portfolio_upstream;
        include /etc/nginx/conf.d/common/proxy.conf;
    }
}
