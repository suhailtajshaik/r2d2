# ═══════════════════════════════════════════════════
# R2D2 ROOT NGINX — Default & Redirect
# ═══════════════════════════════════════════════════

include /etc/nginx/conf.d/common/cloudflare.conf;

# HTTP → HTTPS redirect (all domains)
server {
    listen 80;
    server_name suhailtaj.cloud www.suhailtaj.cloud lab.suhailtaj.cloud _;

    location /health {
        access_log off;
        return 200 'OK';
        add_header Content-Type text/plain;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# Fallback for direct IP access
server {
    listen 443 ssl default_server;
    http2 on;
    server_name _;

    include /etc/nginx/conf.d/common/ssl.conf;
    include /etc/nginx/conf.d/common/security.conf;

    # Redirect to lab
    location / {
        return 301 https://lab.suhailtaj.cloud$request_uri;
    }

    location /health {
        access_log off;
        return 200 'OK';
        add_header Content-Type text/plain;
    }
}
