worker_processes auto;

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    sendfile on;
    keepalive_timeout 65;

    # Docker DNS resolver
    resolver 127.0.0.11:53 valid=10s;
    resolver_timeout 5s;

    # HTTP → HTTPS redirect for all domains
    server {
        listen 80 default_server;
        server_name _;
        return 301 https://$host$request_uri;
    }

    # Default HTTPS server — reject unknown hosts
    server {
        listen 443 ssl default_server;
        server_name _;
        ssl_certificate     /etc/nginx/ssl/cert.pem;
        ssl_certificate_key /etc/nginx/ssl/key.pem;
        return 444;
    }

    # Lab — lab.suhailtaj.cloud (HTTPS only)
    server {
        listen 443 ssl;
        server_name lab.suhailtaj.cloud;

        ssl_certificate     /etc/nginx/ssl/cert.pem;
        ssl_certificate_key /etc/nginx/ssl/key.pem;
        ssl_protocols       TLSv1.2 TLSv1.3;
        ssl_ciphers         HIGH:!aNULL:!MD5;

        location ~ ^/prompt-studio-dev/ {
            set $upstream_dev "prompt-studio-dev:80";
            rewrite ^/prompt-studio-dev(/.*)$ $1 break;
            proxy_pass http://$upstream_dev;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location ~ ^/prompt-studio/ {
            set $upstream_prod "prompt-studio:80";
            rewrite ^/prompt-studio(/.*)$ $1 break;
            proxy_pass http://$upstream_prod;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location / {
            set $upstream_lab "lab:80";
            proxy_pass http://$upstream_lab;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }

    # Portfolio — suhailtaj.cloud (HTTPS only)
    server {
        listen 443 ssl;
        server_name suhailtaj.cloud;

        ssl_certificate     /etc/nginx/ssl/cert.pem;
        ssl_certificate_key /etc/nginx/ssl/key.pem;
        ssl_protocols       TLSv1.2 TLSv1.3;
        ssl_ciphers         HIGH:!aNULL:!MD5;

        location / {
            set $upstream_portfolio "portfolio:80";
            proxy_pass http://$upstream_portfolio;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }

    # News — news.suhailtaj.cloud & news.suhail.me (HTTPS only - PRODUCTION)
    server {
        listen 443 ssl;
        server_name news.suhailtaj.cloud news.suhail.me;

        ssl_certificate     /etc/nginx/ssl/cert.pem;
        ssl_certificate_key /etc/nginx/ssl/key.pem;
        ssl_protocols       TLSv1.2 TLSv1.3;
        ssl_ciphers         HIGH:!aNULL:!MD5;

        location / {
            set $upstream_news "news-site:80";
            proxy_pass http://$upstream_news;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }

    # News Dev — news-dev.suhailtaj.cloud (HTTPS only - DEV/TESTING)
    server {
        listen 443 ssl;
        server_name news-dev.suhailtaj.cloud;

        ssl_certificate     /etc/nginx/ssl/cert.pem;
        ssl_certificate_key /etc/nginx/ssl/key.pem;
        ssl_protocols       TLSv1.2 TLSv1.3;
        ssl_ciphers         HIGH:!aNULL:!MD5;

        location / {
            set $upstream_news_dev "news-site-dev:80";
            proxy_pass http://$upstream_news_dev;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }

    # Files — files.suhailtaj.cloud (HTTPS only)
    server {
        listen 443 ssl;
        server_name files.suhailtaj.cloud;

        ssl_certificate     /etc/nginx/ssl/cert.pem;
        ssl_certificate_key /etc/nginx/ssl/key.pem;
        ssl_protocols       TLSv1.2 TLSv1.3;
        ssl_ciphers         HIGH:!aNULL:!MD5;

        location /public-files/ {
            alias /home/r2d2/public-files/;
            autoindex on;
            autoindex_format html;
            add_header Cache-Control "public, max-age=3600";
        }
    }
}
